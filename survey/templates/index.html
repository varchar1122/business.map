<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>БИЗНЕС.КАРТА | Анкета предпринимателя</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="brand-block">
          <div class="brand-title">БИЗНЕС.КАРТА</div>
        </div>

        <div class="form" id="surveyForm">
          <form id="businessSurveyForm" novalidate>
            <div class="fields-section">
              <div class="form-group required-field">
                <label for="companyName"
                  >Название бизнеса <span class="star">*</span></label
                >
                <input
                  type="text"
                  id="companyName"
                  name="companyName"
                  placeholder="ООО ТехноПро, ИП Иванов, Кофейная лавка"
                  autocomplete="off"
                />
                <div class="error-message" id="companyNameError"></div>
              </div>

              <div class="form-group required-field">
                <label for="businessType"
                  >Сфера бизнеса <span class="star">*</span></label
                >
                <input
                  type="text"
                  id="businessType"
                  name="businessType"
                  placeholder="Онлайн-школа, IT компания, столовая, производство"
                  autocomplete="off"
                />
                <div class="error-message" id="businessTypeError"></div>
              </div>

              <div class="form-group required-field">
                <label for="region"
                  >Город, область или страна<span class="star">*</span></label
                >
                <input
                  type="text"
                  id="region"
                  name="region"
                  placeholder="Юрга, Кузбасс, Россия"
                  autocomplete="off"
                />
                <div class="error-message" id="regionError"></div>
              </div>
            </div>

            <div class="fields-section">
              <div class="section-badge optional-badge">
                НЕОБЯЗАТЕЛЬНОЕ ПОЛЕ
              </div>

              <div class="form-group">
                <label for="website">Веб-сайт компании</label>
                <input
                  type="url"
                  id="website"
                  name="website"
                  placeholder="https://example.com или страница в соцсетях"
                  autocomplete="off"
                />
              </div>
            </div>

            <button type="submit" id="submitSurveyBtn" class="submit-btn">
              ОТПРАВИТЬ АНКЕТУ
            </button>
          </form>
        </div>

        <!-- Контейнер для отчёта нейросети -->
        <div
          id="reportContainer"
          class="report-container"
          style="display: none"
        >
          <div class="report-header">Аналитический отчёт</div>
          <div id="reportContent" class="report-content"></div>
        </div>

        <!-- Индикатор загрузки -->
        <div
          id="loadingIndicator"
          class="loading-indicator"
          style="display: none"
        >
          <div class="spinner"></div>
          <p>Генерация отчёта на основе ИИ... Это может занять до 30 секунд.</p>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
